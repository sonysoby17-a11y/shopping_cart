<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Keto Admin</title>
</head>
<body>
    <div class="glass-card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Keto Inventory Management</h2>
            <a href="/logout" style="color: #94a3b8; text-decoration: none;">Logout</a>
        </div>
        <form action="/add_product" method="POST" style="margin-top: 20px;">
            <input type="text" name="name" placeholder="Product Name" required>
            <input type="number" name="price" placeholder="Price" step="0.01" required>
            <button type="submit" class="btn">Add to Catalog</button>
        </form>
        <table>
            <thead>
                <tr><th>Product</th><th>Price</th><th>Action</th></tr>
            </thead>
            <tbody>
                {% for p in products %}
                <tr>
                    <td>{{ p[1] }}</td>
                    <td>${{ p[2] }}</td>
                    <td><a href="/delete/{{ p[0] }}" class="btn btn-red">Remove</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div class="glass-card">
        <h2>Customer Order History</h2>
        <table>
            <thead>
                <tr><th>Buyer</th><th>Location</th><th>Product</th><th>Qty</th><th>Total</th><th>Date</th></tr>
            </thead>
            <tbody>
                {% for o in orders %}
                <tr>
                    <td>{{ o[1] }}</td>
                    <td>{{ o[2] }}</td>
                    <td>{{ o[3] }}</td>
                    <td>{{ o[4] }}</td>
                    <td>${{ o[5] }}</td>
                    <td>{{ o[6] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
